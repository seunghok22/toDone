<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 미니멀한 회색 계열 그라데이션 및 투명도 설정 -->
    <linearGradient id="logo-gradient-grey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2F2F7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#AEAEB2;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- 부드러운 그림자 효과 -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <!-- 반투명 회색 둥근 사각형 (macOS App Icon Shape) -->
    <rect x="40" y="40" width="176" height="176" rx="46" fill="url(#logo-gradient-grey)" stroke="white" stroke-width="0.5" stroke-opacity="0.3" />
    
    <!-- 더 짙은 회색의 세련된 체크마크 -->
    <path 
      d="M85 130L115 160L170 95" 
      stroke="#3A3A3C" 
      stroke-width="18" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      style="opacity: 0.9"
    />
  </g>
</svg>
